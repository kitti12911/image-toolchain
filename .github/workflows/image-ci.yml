name: Image CI

on:
    pull_request:
        paths:
            - ".github/workflows/image-ci.yml"
            - ".github/workflows/release.yml"
            - "images/**"
            - "scripts/**"
            - "Makefile"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    validate:
        name: Build And Scan ${{ matrix.image }} (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: image-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: image-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: migration-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: migration-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: release-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: release-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: helm-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: helm-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: security-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: security-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: supply-chain-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: supply-chain-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Set up Docker Buildx
              run: ./scripts/ci/setup-buildx.sh

            - name: Build image for scan
              run: ./scripts/ci/build-image.sh
              env:
                  IMAGE_CONTEXT: images/${{ matrix.image }}
                  IMAGE_PLATFORM: ${{ matrix.platform }}
                  IMAGE_TAG: ${{ matrix.image }}:scan-${{ matrix.arch }}
                  BUILD_CACHE_FROM: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
                  BUILD_CACHE_TO: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
                  BUILD_LOAD: true
                  BUILD_PROVENANCE: false
                  BUILD_SBOM: false

            - name: Scan image with Trivy
              run: ./scripts/ci/scan-image.sh
              env:
                  TRIVY_IMAGE_REF: ${{ matrix.image }}:scan-${{ matrix.arch }}
                  TRIVY_REPORT: ${{ runner.temp }}/trivy-results.json
                  TRIVY_QUIET: true

            - name: Report Trivy findings
              run: ./scripts/print-trivy-findings.sh "${RUNNER_TEMP}/trivy-results.json"
