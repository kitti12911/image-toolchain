name: Image CI

on:
    pull_request:
        paths:
            - ".github/workflows/image-ci.yml"
            - ".github/workflows/release.yml"
            - "images/**"
            - "scripts/**"
            - "Makefile"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    shellcheck:
        name: ShellCheck
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Run shellcheck
              run: shellcheck scripts/*.sh scripts/ci/*.sh

    validate:
        name: Light Build And Scan ${{ matrix.image }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                image:
                    - image-toolchain
                    - migration-toolchain
                    - release-toolchain
                    - helm-toolchain
                    - security-toolchain
                    - supply-chain-toolchain
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Set up Docker Buildx
              run: ./scripts/ci/setup-buildx.sh

            - name: Build image for scan
              run: ./scripts/ci/build-image.sh
              env:
                  IMAGE_CONTEXT: images/${{ matrix.image }}
                  IMAGE_PLATFORM: linux/amd64
                  IMAGE_TAG: ${{ matrix.image }}:scan-amd64
                  BUILD_CACHE_FROM: type=gha,scope=${{ matrix.image }}-amd64
                  BUILD_CACHE_TO: type=gha,mode=max,scope=${{ matrix.image }}-amd64
                  BUILD_LOAD: true
                  BUILD_PROVENANCE: false
                  BUILD_SBOM: false

            - name: Scan image with Trivy
              run: ./scripts/ci/scan-image.sh
              env:
                  TRIVY_IMAGE_REF: ${{ matrix.image }}:scan-amd64
                  TRIVY_REPORT: ${{ runner.temp }}/trivy-results.json
                  TRIVY_QUIET: true

            - name: Report Trivy findings
              run: ./scripts/print-trivy-findings.sh "${RUNNER_TEMP}/trivy-results.json"
