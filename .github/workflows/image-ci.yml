name: Image CI

on:
    pull_request:
        paths:
            - ".github/workflows/image-ci.yml"
            - ".github/workflows/release.yml"
            - "images/**"
            - "scripts/**"
            - "Makefile"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    shellcheck:
        name: ShellCheck
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Run shellcheck
              run: shellcheck scripts/*.sh scripts/ci/*.sh

    validate:
        name: Light Build And Scan ${{ matrix.image }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                image:
                    - image-toolchain
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # docker/setup-buildx-action v4.2.0
            - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

            # docker/build-push-action v7.3.0
            - name: Build image for scan
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
              with:
                  context: images/${{ matrix.image }}
                  platforms: linux/amd64
                  tags: ${{ matrix.image }}:scan-amd64
                  cache-from: type=gha,scope=${{ matrix.image }}-amd64
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}-amd64
                  load: true
                  provenance: false
                  sbom: false

            # aquasecurity/trivy-action v0.36.0
            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
              with:
                  scan-type: image
                  image-ref: ${{ matrix.image }}:scan-amd64
                  format: json
                  output: ${{ runner.temp }}/trivy-results.json
                  severity: HIGH,CRITICAL
                  ignore-unfixed: "true"
                  exit-code: "0"
              env:
                  TRIVY_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db

            - name: Report Trivy findings
              run: ./scripts/print-trivy-findings.sh "${RUNNER_TEMP}/trivy-results.json"
