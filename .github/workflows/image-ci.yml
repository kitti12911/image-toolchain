name: Image CI

on:
    pull_request:
        paths:
            - ".github/workflows/image-ci.yml"
            - ".github/workflows/release.yml"
            - "images/**"
            - "scripts/**"
            - "Makefile"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    validate:
        name: Build And Scan ${{ matrix.image }} (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: image-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: image-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: release-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: release-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: security-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: security-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # docker/setup-buildx-action v3.11.1
            - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

            # docker/build-push-action v6.18.0
            - name: Build image for scan
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
              with:
                  context: images/${{ matrix.image }}
                  load: true
                  platforms: ${{ matrix.platform }}
                  tags: ${{ matrix.image }}:scan-${{ matrix.arch }}
                  cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
                  provenance: false
                  sbom: false

            # aquasecurity/trivy-action v0.36.0
            - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
              with:
                  image-ref: ${{ matrix.image }}:scan-${{ matrix.arch }}
                  format: table
                  exit-code: 1
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
