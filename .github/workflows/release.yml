name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release:
        name: Release Please
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        steps:
            # googleapis/release-please-action v5.0.0
            - id: release
              uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
              with:
                  release-type: simple

    build:
        name: Build And Scan ${{ matrix.image }} (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        needs:
            - release
        if: needs.release.outputs.release_created == 'true'
        env:
            REGISTRY: ${{ vars.TOOLCHAIN_REGISTRY }}
            IMAGE_NAMESPACE: ${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}
            STAGING_IMAGE_REF: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/${{ matrix.image }}:staging-${{ needs.release.outputs.tag_name }}-${{ matrix.arch }}
            ARCH_IMAGE_REF: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ needs.release.outputs.tag_name }}-${{ matrix.arch }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: image-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: image-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: migration-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: migration-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: release-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: release-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: helm-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: helm-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: security-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: security-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: supply-chain-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: supply-chain-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  ref: ${{ needs.release.outputs.tag_name }}

            - name: Check release inputs
              run: ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE STAGING_IMAGE_REF ARCH_IMAGE_REF

            - name: Set up Docker Buildx
              run: ./scripts/ci/setup-buildx.sh

            - name: Login to image registry
              run: ./scripts/ci/login-registry.sh
              env:
                  REGISTRY_USERNAME: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}

            - name: Build and push staging image
              run: ./scripts/ci/build-image.sh
              env:
                  IMAGE_CONTEXT: images/${{ matrix.image }}
                  IMAGE_PLATFORM: ${{ matrix.platform }}
                  IMAGE_TAG: ${{ env.STAGING_IMAGE_REF }}
                  BUILD_CACHE_FROM: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
                  BUILD_CACHE_TO: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
                  BUILD_OUTPUT: type=image,push=true,oci-mediatypes=true
                  BUILD_PROVENANCE: true
                  BUILD_SBOM: true

            - name: Scan image with Trivy
              run: ./scripts/ci/scan-image.sh
              env:
                  TRIVY_IMAGE_REF: ${{ env.STAGING_IMAGE_REF }}
                  TRIVY_REPORT: ${{ runner.temp }}/trivy-results.json
                  TRIVY_QUIET: true
                  TRIVY_IMAGE_SRC: remote
                  TRIVY_PLATFORM: ${{ matrix.platform }}
                  TRIVY_USERNAME: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                  TRIVY_PASSWORD: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}

            - name: Report Trivy findings
              run: ./scripts/print-trivy-findings.sh "${RUNNER_TEMP}/trivy-results.json"

            - name: Promote scanned image tag
              run: ./scripts/ci/promote-image.sh

    publish:
        name: Publish ${{ matrix.image }} Manifest
        runs-on: ubuntu-latest
        needs:
            - release
            - build
        if: needs.release.outputs.release_created == 'true'
        env:
            REGISTRY: ${{ vars.TOOLCHAIN_REGISTRY }}
            IMAGE_NAMESPACE: ${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}
            IMAGE_REF: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/${{ matrix.image }}
            RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
        strategy:
            fail-fast: false
            matrix:
                image:
                    - image-toolchain
                    - migration-toolchain
                    - release-toolchain
                    - helm-toolchain
                    - security-toolchain
                    - supply-chain-toolchain
        steps:
            - name: Check release inputs
              run: ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE IMAGE_REF RELEASE_TAG

            - name: Set up Docker Buildx
              run: ./scripts/ci/setup-buildx.sh

            - name: Login to image registry
              run: ./scripts/ci/login-registry.sh
              env:
                  REGISTRY_USERNAME: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}

            - name: Create multi-arch manifest
              run: ./scripts/ci/publish-manifest.sh

            - name: Sign image digest
              env:
                  COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
              run: ./scripts/ci/sign-image.sh
