name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    plan:
        name: Plan Semantic Release
        runs-on: ubuntu-latest
        container:
            image: node:24.10.0-bookworm@sha256:06e54ecf113a30f0ff9a1d309866a5924d3bda4389eab11a0e1e92f3251d915d
        outputs:
            release_created: ${{ steps.plan.outputs.release_created }}
            tag_name: ${{ steps.plan.outputs.tag_name }}
        steps:
            - name: Install Git
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends git
                  rm -rf /var/lib/apt/lists/*

            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - id: plan
              name: Run semantic-release dry-run
              run: CI_OUTPUT_FILE="${GITHUB_OUTPUT}" ./scripts/ci/semantic-release-plan.sh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        name: Build Staging And Scan ${{ matrix.image }} (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        needs:
            - plan
        if: needs.plan.outputs.release_created == 'true'
        permissions:
            contents: read
            packages: write
        env:
            REGISTRY: ${{ vars.TOOLCHAIN_REGISTRY }}
            IMAGE_NAMESPACE: ${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}
            STAGING_IMAGE_REF: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/${{ matrix.image }}:staging-${{ needs.plan.outputs.tag_name }}-${{ matrix.arch }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: image-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: image-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: migration-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: migration-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: release-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: release-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: helm-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: helm-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: security-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: security-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
                    - image: supply-chain-toolchain
                      arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - image: supply-chain-toolchain
                      arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Check release inputs
              run: ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE STAGING_IMAGE_REF

            - name: Set up Docker Buildx
              run: ./scripts/ci/setup-buildx.sh

            - name: Login to image registry
              run: ./scripts/ci/login-registry.sh
              env:
                  REGISTRY_USERNAME: ${{ github.actor }}
                  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push staging image
              run: ./scripts/ci/build-image.sh
              env:
                  IMAGE_CONTEXT: images/${{ matrix.image }}
                  IMAGE_PLATFORM: ${{ matrix.platform }}
                  IMAGE_TAG: ${{ env.STAGING_IMAGE_REF }}
                  BUILD_CACHE_FROM: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
                  BUILD_CACHE_TO: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
                  BUILD_OUTPUT: type=image,push=true,oci-mediatypes=true
                  BUILD_PROVENANCE: true
                  BUILD_SBOM: true

            - name: Scan image with Trivy
              run: ./scripts/ci/scan-image.sh
              env:
                  TRIVY_IMAGE_REF: ${{ env.STAGING_IMAGE_REF }}
                  TRIVY_REPORT: ${{ runner.temp }}/trivy-results.json
                  TRIVY_QUIET: true
                  TRIVY_IMAGE_SRC: remote
                  TRIVY_PLATFORM: ${{ matrix.platform }}
                  TRIVY_USERNAME: ${{ github.actor }}
                  TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

            - name: Report Trivy findings
              run: ./scripts/print-trivy-findings.sh "${RUNNER_TEMP}/trivy-results.json"

    release:
        name: Publish Semantic Release
        runs-on: ubuntu-latest
        container:
            image: node:24.10.0-bookworm@sha256:06e54ecf113a30f0ff9a1d309866a5924d3bda4389eab11a0e1e92f3251d915d
        needs:
            - plan
            - build
        if: needs.plan.outputs.release_created == 'true'
        steps:
            - name: Install Git
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends git
                  rm -rf /var/lib/apt/lists/*

            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Run semantic-release
              run: ./scripts/ci/semantic-release-publish.sh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    publish:
        name: Publish ${{ matrix.image }} Manifest
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
        needs:
            - plan
            - release
            - build
        if: needs.plan.outputs.release_created == 'true'
        env:
            REGISTRY: ${{ vars.TOOLCHAIN_REGISTRY }}
            IMAGE_NAMESPACE: ${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}
            IMAGE_REF: ${{ vars.TOOLCHAIN_REGISTRY }}/${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}/${{ matrix.image }}
            RELEASE_TAG: ${{ needs.plan.outputs.tag_name }}
        strategy:
            fail-fast: false
            matrix:
                image:
                    - image-toolchain
                    - migration-toolchain
                    - release-toolchain
                    - helm-toolchain
                    - security-toolchain
                    - supply-chain-toolchain
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  ref: ${{ needs.plan.outputs.tag_name }}

            - name: Check release inputs
              run: ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE IMAGE_REF RELEASE_TAG

            - name: Set up Docker Buildx
              run: ./scripts/ci/setup-buildx.sh

            - name: Login to image registry
              run: ./scripts/ci/login-registry.sh
              env:
                  REGISTRY_USERNAME: ${{ github.actor }}
                  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

            # sigstore/cosign-installer v4.1.1
            - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

            - name: Promote scanned image tags
              run: |
                  for arch in amd64 arm64; do
                      STAGING_IMAGE_REF="${IMAGE_REF}:staging-${RELEASE_TAG}-${arch}" \
                      ARCH_IMAGE_REF="${IMAGE_REF}:${RELEASE_TAG}-${arch}" \
                      ./scripts/ci/promote-image.sh
                  done

            - name: Create multi-arch manifest
              run: ./scripts/ci/publish-manifest.sh

            - name: Sign image digest
              run: ./scripts/ci/sign-image.sh

    sync-vars:
        name: Sync Toolchain Image Variables
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        needs:
            - plan
            - publish
        if: needs.plan.outputs.release_created == 'true'
        env:
            REGISTRY: ${{ vars.TOOLCHAIN_REGISTRY }}
            IMAGE_NAMESPACE: ${{ vars.TOOLCHAIN_IMAGE_NAMESPACE }}
            RELEASE_TAG: ${{ needs.plan.outputs.tag_name }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Set up Docker Buildx
              run: ./scripts/ci/setup-buildx.sh

            - name: Login to toolchain registry
              run: ./scripts/ci/login-registry.sh
              env:
                  REGISTRY_USERNAME: ${{ github.actor }}
                  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

            # actions/create-github-app-token v2.1.4
            # homelab-branch-sync needs "Variables: Read and write" permission.
            - uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42
              id: vars-token
              with:
                  app-id: ${{ secrets.BRANCH_SYNC_APP_ID }}
                  private-key: ${{ secrets.BRANCH_SYNC_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}

            - name: Sync toolchain image variables
              run: ./scripts/ci/sync-toolchain-vars.sh
              env:
                  GH_TOKEN: ${{ steps.vars-token.outputs.token }}
                  GITHUB_REPOS: >-
                      ${{ github.repository_owner }}/grpc-sandbox
                      ${{ github.repository_owner }}/oas-sandbox
                      ${{ github.repository_owner }}/worker-sandbox
                      ${{ github.repository_owner }}/saga-sandbox
                      ${{ github.repository_owner }}/payment-sandbox
                      ${{ github.repository_owner }}/lib-util
                      ${{ github.repository_owner }}/lib-orm
                      ${{ github.repository_owner }}/lib-cache
                      ${{ github.repository_owner }}/lib-async
                      ${{ github.repository_owner }}/lib-monitor
                      ${{ github.repository_owner }}/service-gen
                      ${{ github.repository_owner }}/proto-sandbox
                      ${{ github.repository_owner }}/migration-sandbox
                      ${{ github.repository_owner }}/helm-sandbox
