stages:
    - lint
    - plan
    - build
    - release
    - publish

workflow:
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        - if: '$CI_COMMIT_BRANCH == "main"'
        - when: never

variables:
    GIT_DEPTH: "0"
    GITLAB_AMD64_RUNNER_TAG: "amd64"
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: "overlay2"

.image_changes: &image_changes
    - ".gitlab-ci.yml"
    - "images/**"
    - "scripts/**"
    - "Makefile"

.markdown_changes: &markdown_changes
    - ".gitlab-ci.yml"
    - ".markdownlint-cli2.*"
    - ".markdownlint.*"
    - "**/*.md"
    - "**/*.markdown"

.docker_job:
    image: docker:29.1.2-cli@sha256:d525718bb067b852a3a33c49485e5f5ac412be1e6e76f7551bdc202d5a889f85
    services:
        - name: docker:29.1.2-dind@sha256:40916fb078cdd27640d069bba401324a15a06d3ecbd8895048122c8d321f43f8
          alias: docker
    before_script:
        - |
            for attempt in 1 2 3 4 5; do
                if docker info >/dev/null 2>&1; then
                    break
                fi
                if [ "${attempt}" -eq 5 ]; then
                    docker info
                fi
                sleep 2
            done
        - docker buildx version

markdownlint:
    stage: lint
    image: node:24.10.0-bookworm@sha256:06e54ecf113a30f0ff9a1d309866a5924d3bda4389eab11a0e1e92f3251d915d
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *markdown_changes
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes: *markdown_changes
    script:
        - npx --yes markdownlint-cli2@0.22.1

validate:image:
    extends: .docker_job
    stage: lint
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    parallel:
        matrix:
            - TOOLCHAIN_IMAGE:
                  - image-toolchain
                  - migration-toolchain
                  - release-toolchain
                  - helm-toolchain
                  - security-toolchain
                  - supply-chain-toolchain
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *image_changes
    script:
        - ./scripts/ci/setup-buildx.sh
        - >
            IMAGE_CONTEXT="images/${TOOLCHAIN_IMAGE}"
            IMAGE_PLATFORM="linux/amd64"
            IMAGE_TAG="${TOOLCHAIN_IMAGE}:scan-amd64"
            BUILD_LOAD="true"
            BUILD_PROVENANCE="false"
            BUILD_SBOM="false"
            ./scripts/ci/build-image.sh
        - >
            TRIVY_IMAGE_REF="${TOOLCHAIN_IMAGE}:scan-amd64"
            TRIVY_REPORT="${CI_PROJECT_DIR}/trivy-${TOOLCHAIN_IMAGE}.json"
            TRIVY_QUIET="true"
            ./scripts/ci/scan-image.sh
        - ./scripts/print-trivy-findings.sh "${CI_PROJECT_DIR}/trivy-${TOOLCHAIN_IMAGE}.json"

plan:
    stage: plan
    image: node:24.10.0-bookworm@sha256:06e54ecf113a30f0ff9a1d309866a5924d3bda4389eab11a0e1e92f3251d915d
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    script:
        - apt-get update
        - apt-get install -y --no-install-recommends git
        - rm -rf /var/lib/apt/lists/*
        - git fetch --tags --force
        - |
            token="${GL_TOKEN:-${GITLAB_TOKEN:-}}"
            if [ -z "${token}" ]; then
                echo "GL_TOKEN or GITLAB_TOKEN is required for GitLab semantic-release." >&2
                exit 2
            fi
            git remote set-url origin "https://oauth2:${token}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        - CI_OUTPUT_FILE=".semantic-release.outputs" ./scripts/ci/semantic-release-plan.sh
        - sed -n 's/^release_created=/RELEASE_CREATED=/p; s/^tag_name=/RELEASE_TAG=/p' .semantic-release.outputs > release.env
        - cat release.env
    artifacts:
        reports:
            dotenv: release.env

.build_staging:
    extends: .docker_job
    stage: build
    needs:
        - job: plan
          artifacts: true
    parallel:
        matrix:
            - TOOLCHAIN_IMAGE:
                  - image-toolchain
                  - migration-toolchain
                  - release-toolchain
                  - helm-toolchain
                  - security-toolchain
                  - supply-chain-toolchain
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    script:
        - |
            if [ "${RELEASE_CREATED:-false}" != "true" ]; then
                echo "No semantic release planned; skipping staging build."
                exit 0
            fi
        - export REGISTRY="${TOOLCHAIN_REGISTRY:?TOOLCHAIN_REGISTRY is required}"
        - export IMAGE_NAMESPACE="${TOOLCHAIN_IMAGE_NAMESPACE:?TOOLCHAIN_IMAGE_NAMESPACE is required}"
        - export STAGING_IMAGE_REF="${REGISTRY}/${IMAGE_NAMESPACE}/${TOOLCHAIN_IMAGE}:staging-${RELEASE_TAG}-${IMAGE_ARCH}"
        - ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE STAGING_IMAGE_REF
        - ./scripts/ci/setup-buildx.sh
        - REGISTRY_USERNAME="${TOOLCHAIN_REGISTRY_USERNAME}" REGISTRY_PASSWORD="${TOOLCHAIN_REGISTRY_PASSWORD}" ./scripts/ci/login-registry.sh
        - >
            IMAGE_CONTEXT="images/${TOOLCHAIN_IMAGE}"
            IMAGE_PLATFORM="${IMAGE_PLATFORM}"
            IMAGE_TAG="${STAGING_IMAGE_REF}"
            BUILD_OUTPUT="type=image,push=true,oci-mediatypes=true"
            BUILD_PROVENANCE="true"
            BUILD_SBOM="true"
            ./scripts/ci/build-image.sh
        - >
            TRIVY_IMAGE_REF="${STAGING_IMAGE_REF}"
            TRIVY_REPORT="${CI_PROJECT_DIR}/trivy-${TOOLCHAIN_IMAGE}-${IMAGE_ARCH}.json"
            TRIVY_QUIET="true"
            TRIVY_IMAGE_SRC="remote"
            TRIVY_PLATFORM="${IMAGE_PLATFORM}"
            TRIVY_USERNAME="${TOOLCHAIN_REGISTRY_USERNAME}"
            TRIVY_PASSWORD="${TOOLCHAIN_REGISTRY_PASSWORD}"
            ./scripts/ci/scan-image.sh
        - ./scripts/print-trivy-findings.sh "${CI_PROJECT_DIR}/trivy-${TOOLCHAIN_IMAGE}-${IMAGE_ARCH}.json"

build:amd64:
    extends: .build_staging
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    variables:
        IMAGE_ARCH: "amd64"
        IMAGE_PLATFORM: "linux/amd64"

release:
    stage: release
    image: node:24.10.0-bookworm@sha256:06e54ecf113a30f0ff9a1d309866a5924d3bda4389eab11a0e1e92f3251d915d
    needs:
        - job: plan
          artifacts: true
        - job: build:amd64
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    script:
        - |
            if [ "${RELEASE_CREATED:-false}" != "true" ]; then
                echo "No semantic release planned; skipping release publish."
                exit 0
            fi
        - apt-get update
        - apt-get install -y --no-install-recommends git
        - rm -rf /var/lib/apt/lists/*
        - git fetch --tags --force
        - |
            token="${GL_TOKEN:-${GITLAB_TOKEN:-}}"
            if [ -z "${token}" ]; then
                echo "GL_TOKEN or GITLAB_TOKEN is required for GitLab semantic-release." >&2
                exit 2
            fi
            git remote set-url origin "https://oauth2:${token}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        - ./scripts/ci/semantic-release-publish.sh

publish:manifest:
    extends: .docker_job
    stage: publish
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    needs:
        - job: plan
          artifacts: true
        - job: build:amd64
        - job: release
    parallel:
        matrix:
            - TOOLCHAIN_IMAGE:
                  - image-toolchain
                  - migration-toolchain
                  - release-toolchain
                  - helm-toolchain
                  - security-toolchain
                  - supply-chain-toolchain
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    script:
        - |
            if [ "${RELEASE_CREATED:-false}" != "true" ]; then
                echo "No semantic release planned; skipping manifest publish."
                exit 0
            fi
        - apk add --no-cache cosign
        - export REGISTRY="${TOOLCHAIN_REGISTRY:?TOOLCHAIN_REGISTRY is required}"
        - export IMAGE_NAMESPACE="${TOOLCHAIN_IMAGE_NAMESPACE:?TOOLCHAIN_IMAGE_NAMESPACE is required}"
        - export IMAGE_REF="${REGISTRY}/${IMAGE_NAMESPACE}/${TOOLCHAIN_IMAGE}"
        - export RELEASE_TAG="${RELEASE_TAG:?RELEASE_TAG is required}"
        - export IMAGE_ARCHES="amd64"
        - ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE IMAGE_REF RELEASE_TAG
        - ./scripts/ci/setup-buildx.sh
        - REGISTRY_USERNAME="${TOOLCHAIN_REGISTRY_USERNAME}" REGISTRY_PASSWORD="${TOOLCHAIN_REGISTRY_PASSWORD}" ./scripts/ci/login-registry.sh
        - |
            for arch in ${IMAGE_ARCHES}; do
                STAGING_IMAGE_REF="${IMAGE_REF}:staging-${RELEASE_TAG}-${arch}" \
                ARCH_IMAGE_REF="${IMAGE_REF}:${RELEASE_TAG}-${arch}" \
                ./scripts/ci/promote-image.sh
            done
        - ./scripts/ci/publish-manifest.sh
        - ./scripts/ci/sign-image.sh
